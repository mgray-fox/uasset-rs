name: Build Binaries

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: uasset-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: uasset-macos-arm64
            macos_deployment_target: "11.0"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: uasset-macos-x86_64
            macos_deployment_target: "10.15"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: uasset-windows-x86_64.exe
            rustflags: -C target-feature=+crt-static

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --features commandline-tool --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/uasset

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/uasset.exe
            target/${{ matrix.target }}/release/uasset.pdb
